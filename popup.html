<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instagram PiP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #c060f8;
      --accent2: #f060b8;
      --green: #34d399;
      --red: #f87171;
      --text: #e8e8f0;
      --muted: #6868888;
      --glow: rgba(192, 96, 248, 0.3);
    }

    body {
      width: 300px;
      min-height: 340px;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow: hidden;
      position: relative;
    }

    /* Atmospheric background */
    body::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(192,96,248,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      bottom: -40px; left: -40px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(240,96,184,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .wrap {
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 16px var(--glow);
      flex-shrink: 0;
    }
    .header-text h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.2px;
      line-height: 1.2;
    }
    .header-text p {
      font-size: 11px;
      color: #686888;
      margin-top: 1px;
    }

    /* Status card */
    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
    }
    .status-label {
      color: #686888;
      font-weight: 400;
    }
    .status-val {
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: 500;
      font-size: 12px;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.red   { background: var(--red);   box-shadow: 0 0 6px var(--red); }
    .dot.grey  { background: #555; }
    .dot.pulse {
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 10px 0;
    }

    /* Main Button */
    .pip-btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .pip-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent);
      pointer-events: none;
    }
    .pip-btn.enter {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 20px rgba(192, 96, 248, 0.4);
    }
    .pip-btn.enter:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(192, 96, 248, 0.55);
    }
    .pip-btn.enter:active {
      transform: translateY(0);
    }
    .pip-btn.exit {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .pip-btn.exit:hover {
      border-color: var(--red);
      color: var(--red);
      background: rgba(248, 113, 113, 0.05);
    }
    .pip-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    /* Message banner */
    .message {
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.5;
      display: none;
      align-items: flex-start;
      gap: 8px;
      margin-top: 4px;
    }
    .message.show { display: flex; }
    .message.error {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      color: #fca5a5;
    }
    .message.info {
      background: rgba(192,96,248,0.08);
      border: 1px solid rgba(192,96,248,0.2);
      color: #d8aafc;
    }
    .message.success {
      background: rgba(52,211,153,0.08);
      border: 1px solid rgba(52,211,153,0.2);
      color: #6ee7b7;
    }

    /* Footer tip */
    .tip {
      margin-top: 14px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 11px;
      color: #686888;
      line-height: 1.5;
    }
    .tip strong {
      color: #9898b8;
      font-weight: 500;
    }

    /* Stream picker */
    .picker-label {
      font-size: 11px;
      color: #686888;
      margin-bottom: 6px;
    }
    .stream-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 5px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }
    .stream-option:hover {
      border-color: var(--accent);
      background: rgba(192,96,248,0.06);
    }
    .stream-option.active {
      border-color: var(--accent);
      background: rgba(192,96,248,0.1);
      color: #d8aafc;
    }
    .stream-meta {
      color: #686888;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
    }

    /* Loading spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    .spinner.dark {
      border-color: rgba(100,100,140,0.3);
      border-top-color: #9898b8;
    }
  </style>
</head>
<body>
<div class="wrap">
  <!-- Header -->
  <div class="header">
    <div class="logo">📺</div>
    <div class="header-text">
      <h1>Instagram PiP</h1>
      <p>Picture-in-Picture for video calls</p>
    </div>
  </div>

  <!-- Status Card -->
  <div class="status-card">
    <div class="status-row">
      <span class="status-label">Page</span>
      <span class="status-val" id="page-status">
        <span class="dot grey"></span>
        <span>Checking…</span>
      </span>
    </div>
    <div class="divider"></div>
    <div class="status-row">
      <span class="status-label">Video stream</span>
      <span class="status-val" id="video-status">
        <span class="dot grey"></span>
        <span>—</span>
      </span>
    </div>
    <div class="divider"></div>
    <div class="status-row">
      <span class="status-label">PiP window</span>
      <span class="status-val" id="pip-status">
        <span class="dot grey"></span>
        <span>Inactive</span>
      </span>
    </div>
  </div>

  <!-- Buttons -->
  <button class="pip-btn enter" id="enter-btn" disabled>
    <span class="spinner" id="enter-spinner" style="display:none"></span>
    <span id="enter-icon">⊞</span>
    <span id="enter-label">Float Video Call</span>
  </button>

  <button class="pip-btn exit" id="exit-btn" style="display:none">
    <span>✕</span>
    <span>Close PiP Window</span>
  </button>

  <!-- Switch stream picker -->
  <div id="stream-picker" style="display:none; margin-bottom:10px;">
    <div class="picker-label">Showing wrong video? Pick a stream:</div>
    <div id="stream-list"></div>
  </div>

  <!-- Message area -->
  <div class="message" id="message">
    <span id="msg-icon">ℹ️</span>
    <span id="msg-text"></span>
  </div>

  <!-- Tip -->
  <div class="tip" id="tip">
    <strong>How to use:</strong> Start an Instagram video call, then click "Float Video Call". The call will pop into a mini window that stays on top of everything you do.
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
